name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.*'
          modules: 'qtcharts'

      - name: Install dependencies
        run: brew install sqlite3

      - name: Configure
        run: |
          cd native
          mkdir -p build
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$Qt6_DIR"

      - name: Build
        run: cmake --build native/build --config Release -j$(sysctl -n hw.ncpu)

      - name: Install
        run: cmake --install native/build --prefix native/install

      - name: Bundle Qt frameworks
        run: macdeployqt native/install/NativeSpreadsheet.app || true

      - name: Code sign
        run: codesign --force --deep -s - native/install/NativeSpreadsheet.app

      - name: Verify signature
        run: codesign --verify --deep --strict native/install/NativeSpreadsheet.app

      - name: Create DMG
        run: |
          mkdir -p /tmp/nexel-dmg
          cp -R native/install/NativeSpreadsheet.app /tmp/nexel-dmg/Nexel.app
          ln -s /Applications /tmp/nexel-dmg/Applications
          hdiutil create -volname "Nexel" \
            -srcfolder /tmp/nexel-dmg \
            -ov -format UDZO \
            -imagekey zlib-level=9 \
            Nexel-${{ github.ref_name }}-macOS-arm64.dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Nexel-macOS-arm64
          path: Nexel-*.dmg

  build-macos-x64:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.*'
          modules: 'qtcharts'

      - name: Install dependencies
        run: brew install sqlite3

      - name: Configure
        run: |
          cd native
          mkdir -p build
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$Qt6_DIR" \
            -DCMAKE_OSX_ARCHITECTURES=x86_64

      - name: Build
        run: cmake --build native/build --config Release -j$(sysctl -n hw.ncpu)

      - name: Install
        run: cmake --install native/build --prefix native/install

      - name: Bundle Qt frameworks
        run: macdeployqt native/install/NativeSpreadsheet.app || true

      - name: Code sign
        run: codesign --force --deep -s - native/install/NativeSpreadsheet.app

      - name: Verify signature
        run: codesign --verify --deep --strict native/install/NativeSpreadsheet.app

      - name: Create DMG
        run: |
          mkdir -p /tmp/nexel-dmg
          cp -R native/install/NativeSpreadsheet.app /tmp/nexel-dmg/Nexel.app
          ln -s /Applications /tmp/nexel-dmg/Applications
          hdiutil create -volname "Nexel" \
            -srcfolder /tmp/nexel-dmg \
            -ov -format UDZO \
            -imagekey zlib-level=9 \
            Nexel-${{ github.ref_name }}-macOS-x64.dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Nexel-macOS-x64
          path: Nexel-*.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.*'
          modules: 'qtcharts'
          arch: 'win64_msvc2019_64'

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install SQLite via vcpkg
        run: |
          vcpkg install sqlite3:x64-windows
          echo "CMAKE_TOOLCHAIN_FILE=$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" >> $env:GITHUB_ENV

      - name: Configure
        run: |
          cd native
          New-Item -ItemType Directory -Force -Path build | Out-Null
          cmake -B build -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_PREFIX_PATH="$env:Qt6_DIR" `
            -DCMAKE_TOOLCHAIN_FILE="$env:CMAKE_TOOLCHAIN_FILE"

      - name: Build
        run: cmake --build native/build --config Release -j $env:NUMBER_OF_PROCESSORS

      - name: Install
        run: cmake --install native/build --prefix native/install --config Release

      - name: Deploy Qt DLLs
        run: |
          $exePath = Get-ChildItem -Path native/install -Recurse -Filter "NativeSpreadsheet.exe" | Select-Object -First 1
          if ($exePath) {
            windeployqt $exePath.FullName --release --no-translations
          }

      - name: Create portable package
        run: |
          # Create a clean distribution folder
          $distDir = "Nexel-${{ github.ref_name }}-Windows-x64"
          New-Item -ItemType Directory -Force -Path $distDir | Out-Null

          # Copy installed files
          if (Test-Path "native/install/bin") {
            Copy-Item -Path "native/install/bin/*" -Destination $distDir -Recurse
          } else {
            Copy-Item -Path "native/install/*" -Destination $distDir -Recurse
          }

          # Rename exe to Nexel.exe
          $exe = Get-ChildItem -Path $distDir -Filter "NativeSpreadsheet.exe" -Recurse | Select-Object -First 1
          if ($exe) {
            Rename-Item -Path $exe.FullName -NewName "Nexel.exe"
          }

          Compress-Archive -Path "$distDir/*" -DestinationPath "Nexel-${{ github.ref_name }}-Windows-x64.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Nexel-Windows-x64
          path: Nexel-*.zip

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake \
            libsqlite3-dev \
            libgl1-mesa-dev \
            libxkbcommon-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            libx11-dev libx11-xcb-dev \
            libxext-dev libxfixes-dev \
            libxi-dev libxrender-dev \
            libxcb1-dev libxcb-cursor-dev \
            libxcb-glx0-dev libxcb-keysyms1-dev \
            libxcb-image0-dev libxcb-shm0-dev \
            libxcb-icccm4-dev libxcb-sync-dev \
            libxcb-xfixes0-dev libxcb-shape0-dev \
            libxcb-randr0-dev libxcb-render-util0-dev \
            libxcb-xinerama0-dev libxcb-xkb-dev \
            libxkbcommon-x11-dev \
            libdbus-1-dev \
            fuse libfuse2

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.*'
          modules: 'qtcharts'

      - name: Configure
        run: |
          cd native
          mkdir -p build
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$Qt6_DIR" \
            -DCMAKE_INSTALL_PREFIX=/usr

      - name: Build
        run: cmake --build native/build --config Release -j$(nproc)

      - name: Install
        run: DESTDIR=native/AppDir cmake --install native/build

      - name: Create AppImage
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy*.AppImage

          # Create desktop file
          mkdir -p native/AppDir/usr/share/applications
          cat > native/AppDir/usr/share/applications/nexel.desktop << 'DESKTOP'
          [Desktop Entry]
          Type=Application
          Name=Nexel
          Comment=High-performance native spreadsheet application
          Exec=NativeSpreadsheet
          Icon=nexel
          Categories=Office;Spreadsheet;
          DESKTOP

          # Create icon
          mkdir -p native/AppDir/usr/share/icons/hicolor/256x256/apps
          python3 -c "
          from PIL import Image, ImageDraw
          img = Image.new('RGB', (256, 256), '#1A7A5A')
          d = ImageDraw.Draw(img)
          d.text((90, 60), 'N', fill='white')
          img.save('native/AppDir/usr/share/icons/hicolor/256x256/apps/nexel.png')
          " 2>/dev/null || \
          convert -size 256x256 xc:"#1A7A5A" -gravity center \
            -fill white -font Helvetica-Bold -pointsize 80 \
            -annotate 0 "N" \
            native/AppDir/usr/share/icons/hicolor/256x256/apps/nexel.png 2>/dev/null || \
          printf '\x89PNG\r\n\x1a\n' > native/AppDir/usr/share/icons/hicolor/256x256/apps/nexel.png

          export QMAKE=$Qt6_DIR/bin/qmake
          export LD_LIBRARY_PATH=$Qt6_DIR/lib:$LD_LIBRARY_PATH
          ./linuxdeploy-x86_64.AppImage \
            --appdir native/AppDir \
            --plugin qt \
            --output appimage \
            --desktop-file native/AppDir/usr/share/applications/nexel.desktop || true

          mv Nexel-*.AppImage Nexel-${{ github.ref_name }}-Linux-x86_64.AppImage 2>/dev/null || \
          mv *.AppImage Nexel-${{ github.ref_name }}-Linux-x86_64.AppImage 2>/dev/null || true

      - name: Fallback - Create tar.gz if AppImage fails
        if: always()
        run: |
          if [ ! -f Nexel-*-Linux-*.AppImage ]; then
            tar -czf Nexel-${{ github.ref_name }}-Linux-x86_64.tar.gz -C native/AppDir usr/
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Nexel-Linux-x64
          path: |
            Nexel-*-Linux-*

  create-release:
    needs: [build-macos, build-macos-x64, build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Nexel ${{ github.ref_name }}"
          body: |
            ## Nexel ${{ github.ref_name }}

            High-performance native spreadsheet — handles millions of rows.

            ### Downloads
            | Platform | File |
            |----------|------|
            | macOS (Apple Silicon) | `Nexel-${{ github.ref_name }}-macOS-arm64.dmg` |
            | macOS (Intel) | `Nexel-${{ github.ref_name }}-macOS-x64.dmg` |
            | Windows (64-bit) | `Nexel-${{ github.ref_name }}-Windows-x64.zip` |
            | Linux (64-bit) | `Nexel-${{ github.ref_name }}-Linux-x86_64.AppImage` |

            ### What's New in v3.0.0
            - **Performance**: Background file import with progress dialog (no UI freeze)
            - **Performance**: Fast bulk import bypassing dependency tracking (3-5x faster)
            - **Performance**: Inline cell reference parser replacing regex for XLSX import
            - **Performance**: Cmd/Ctrl+Arrow navigation now instant on million-row sheets
            - **Performance**: SpreadsheetModel fast paths for default-style cells
            - **UI**: Redesigned app icon with chart overlay
            - **Fix**: macOS app launch crash (Qt framework bundling)
            - **Fix**: Proper code signing and rpath configuration
          files: |
            artifacts/**/*
          draft: false
          prerelease: false
